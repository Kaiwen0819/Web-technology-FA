<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Details • Lost & Found</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

<div class="menu-overlay" id="menuOverlay"></div>

<aside class="side-drawer" id="sideDrawer" aria-label="Sidebar navigation">
  <div class="drawer-head">
    <div class="brand">
      <div class="logo" aria-hidden="true">QIU</div>
      <div>
        <h1 class="site-title">Campus Lost & Found</h1>
        <p class="site-subtitle">Navigation</p>
      </div>
    </div>
    <button class="drawer-close" id="closeMenuBtn" aria-label="Close menu">✕</button>
  </div>

  <div class="drawer-user" id="drawerUserEmail">Signed in</div>

  <nav class="drawer-nav">
    <a class="drawer-link" data-drawer="home" href="home.html">Home</a>
    <a class="drawer-link" data-drawer="report" href="report.html">Report</a>
    <a class="drawer-link" data-drawer="lost" href="lost.html">Lost</a>
    <a class="drawer-link" data-drawer="found" href="found.html">Found</a>
  </nav>

  <div class="drawer-bottom">
    <button class="drawer-logout" id="btnLogout">Logout</button>
  </div>
</aside>

<header class="site-header compact-header">
  <div class="container topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="openMenuBtn" aria-label="Open menu">☰</button>
      <div class="brand">
        <div class="logo" aria-hidden="true">QIU</div>
        <div>
          <h1 class="site-title">Campus Lost & Found</h1>
          <p class="site-subtitle">Details</p>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <span class="nav-user" id="navUserEmail">Signed in</span>
    </div>
  </div>
</header>

  <main id="main" class="container">
    <section class="card">
      <div class="card-head">
        <strong id="title">Item Details</strong>
        <span class="muted" id="subtitle"></span>
      </div>

      <div id="content"></div>

      <!-- ✅ Photo only visible here -->
      <div id="photoWrap" class="card" hidden style="margin-top:14px;">
        <div class="card-head">
          <strong>Photo</strong>
          <span class="muted"></span>
        </div>
        <img id="photoImg" alt="Item photo" style="max-width:100%;border-radius:12px" />
      </div>

      <div class="actions" id="actions" hidden>
        <a class="btn btn-primary" id="editLink" href="#">Edit</a>
        <button class="btn btn-ghost" id="statusBtn" type="button">Update Status</button>
        <button class="btn btn-danger" id="deleteBtn" type="button">Delete</button>
        <a class="btn btn-ghost" id="backLink" href="home.html">Back</a>
      </div>

      <div class="empty" id="empty" hidden>
        <p>Item not found.</p>
        <a class="btn btn-primary" href="home.html">Go Home</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Campus Lost & Found</p>
      <p class="muted">Campus reporting portal</p>
    </div>
  </footer>

  <script type="module" src="details.js"></script>
</body>
</html>

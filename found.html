<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Found Items • Lost & Found</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

<div class="menu-overlay" id="menuOverlay"></div>

<aside class="side-drawer" id="sideDrawer" aria-label="Sidebar navigation">
  <div class="drawer-head">
    <div class="brand">
      <div class="logo" aria-hidden="true">QIU</div>
      <div>
        <h1 class="site-title">Campus Lost & Found</h1>
        <p class="site-subtitle">Navigation</p>
      </div>
    </div>
    <button class="drawer-close" id="closeMenuBtn" aria-label="Close menu">✕</button>
  </div>

  <div class="drawer-user" id="drawerUserEmail">Signed in</div>

  <nav class="drawer-nav">
    <a class="drawer-link" data-drawer="home" href="home.html">Home</a>
    <a class="drawer-link" data-drawer="report" href="report.html">Report</a>
    <a class="drawer-link" data-drawer="lost" href="lost.html">Lost</a>
    <a class="drawer-link active" data-drawer="found" href="found.html">Found</a>
  </nav>

  <div class="drawer-bottom">
    <button class="drawer-logout" id="btnLogout">Logout</button>
  </div>
</aside>

<header class="site-header compact-header">
  <div class="container topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="openMenuBtn" aria-label="Open menu">☰</button>
      <div class="brand">
        <div class="logo" aria-hidden="true">QIU</div>
        <div>
          <h1 class="site-title">Campus Lost & Found</h1>
          <p class="site-subtitle">Found</p>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <span class="nav-user" id="navUserEmail">Signed in</span>
    </div>
  </div>
</header>

  <main id="main" class="container">
    <section class="card">
      <div class="card-head">
        <strong>Found Items</strong>
        <span class="muted" id="count">0 items</span>
      </div>

      <div class="toolbar">
        <div class="left">
          <div class="control">
            <label for="filterStatus">Status</label>
            <select id="filterStatus">
              <option value="All">All</option>
              <option value="Active">Active</option>
              <option value="Claimed">Claimed</option>
              <option value="Resolved">Resolved</option>
            </select>
          </div>

          <div class="control">
            <label for="sortBy">Sort</label>
            <select id="sortBy">
              <option value="newest">Newest date</option>
              <option value="oldest">Oldest date</option>
              <option value="titleAZ">Title A–Z</option>
              <option value="titleZA">Title Z–A</option>
            </select>
          </div>
        </div>

        <div class="right">
          <div class="control">
            <label for="search">Search</label>
            <input id="search" type="search" placeholder="Search title/location..." />
          </div>

          <a class="btn btn-primary" href="report.html">+ New</a>
        </div>
      </div>

      <ul class="list" id="list" aria-live="polite"></ul>

      <div class="empty" id="empty" hidden>
        <p>No results. Create a new report.</p>
        <a class="btn btn-primary" href="report.html">Submit</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Campus Lost & Found</p>
      <p class="muted">Campus reporting portal</p>  
    </div>
  </footer>

  <script type="module">
    import { setActiveNav, setYear } from "./common.js";
    setActiveNav("found");
    setYear();
  </script>
  <script type="module" src="list.js"></script>
</body>
</html>

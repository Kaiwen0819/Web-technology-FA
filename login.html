<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login • Campus Lost & Found</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="landing-page brand-home">
  <header class="brand-header">
    <div class="brand-container brand-nav">
      <div class="brand-logo-wrap">
        <div class="brand-logo">QIU</div>
        <div>
          <h1 class="brand-name">Campus Lost & Found</h1>
          <p class="brand-sub">QIU Student Portal</p>
        </div>
      </div>

      <div class="brand-nav-actions">
        <a href="index.html" class="btn btn-ghost">Back</a>
        <a href="register.html" class="btn btn-primary">Register</a>
      </div>
    </div>
  </header>

  <main class="brand-main">
    <section class="brand-container" style="display:grid; place-items:center; padding-top:26px;">
      <div class="card auth-card" style="max-width:520px; width:100%;">
        <h2 style="margin-top:10px;">Login</h2>
        <p class="muted" style="margin-top:8px;">
          Use your QIU email to access the portal.
        </p>

        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="yourname@qiu.edu.my"
          required
          pattern="^[^@\\s]+@qiu\\.edu\\.my$"
        />

        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          placeholder="********"
          required
        />

        <button id="btnLogin" class="btn btn-primary auth-submit">Login</button>
      </div>
    </section>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
